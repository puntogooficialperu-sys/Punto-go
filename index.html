<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Punto Go – Máncora</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#6abf1e;--green-dark:#4a8f0e;--navy:#0d1b2a;--pink:#f4527a;--fuchsia:#e91e8c;--pink-light:#ffd6e0;--white:#fff;--text:#1a1a2e;--muted:#607080;--cream:#f0f8ff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Poppins",sans-serif;background:var(--cream);color:var(--text);}
    .view{display:none;}.view.active{display:block;}

    .hero{width:100%;position:relative;line-height:0;}
    .hero img{width:100%;display:block;max-height:200px;object-fit:cover;object-position:center top;}
    .wave-wrap{position:absolute;bottom:0;left:0;right:0;line-height:0;}
    .wave-wrap svg{display:block;width:100%;}

    .cat-tabs{display:flex;gap:8px;padding:14px 12px 6px;overflow-x:auto;scrollbar-width:none;}
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--white);border-radius:14px;padding:10px 16px;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.07);min-width:70px;}
    .cat-tab.active{border-color:var(--green);background:#f0ffe0;}
    .cat-tab .cat-icon{font-size:1.5rem;}
    .cat-tab .cat-label{font-size:.72rem;font-weight:700;color:var(--text);}
    .cat-tab.active .cat-label{color:var(--green-dark);}

    .section-title{padding:12px 16px 2px;font-size:1.1rem;font-weight:800;color:var(--navy);}
    .section-sub{padding:0 16px 10px;font-size:.78rem;color:var(--muted);}

    .business-list{padding:0 12px 20px;display:flex;flex-direction:column;gap:10px;}
    .biz-card{background:var(--white);border-radius:16px;display:flex;align-items:center;gap:12px;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s;border:2px solid transparent;}
    .biz-card:active{transform:scale(.97);}
    .biz-card.coming-soon{opacity:.5;cursor:default;}
    .biz-logo{width:60px;height:60px;border-radius:14px;object-fit:cover;flex-shrink:0;border:2px solid #f0f0f0;}
    .biz-logo-ph{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
    .green-bg{background:linear-gradient(135deg,#d0f5b0,#c8f0c0);}
    .biz-info{flex:1;}
    .biz-name{font-weight:700;font-size:.95rem;}
    .biz-desc{font-size:.75rem;color:var(--muted);margin-top:2px;}
    .biz-badge{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;}
    .badge-open{background:#e8ffe0;color:var(--green-dark);}
    .badge-soon{background:#f0f0f0;color:#999;}
    .biz-arrow{font-size:1.3rem;color:var(--muted);}
    .empty-cat{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty-cat .emoji{font-size:3rem;display:block;margin-bottom:10px;}
    .empty-cat p{font-size:.88rem;}

    .dm-header{background:linear-gradient(135deg,#f4527a 0%,#e91e8c 60%,#c2185b 100%);padding:14px 16px 18px;position:relative;overflow:hidden;}
    .dm-header::before{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.1);border-radius:50%;}
    .back-btn{background:rgba(255,255,255,.25);border:none;border-radius:20px;color:#fff;font-size:.83rem;font-weight:700;padding:5px 13px;cursor:pointer;margin-bottom:10px;display:inline-flex;align-items:center;gap:5px;}
    .dm-header-inner{display:flex;align-items:center;gap:14px;}
    .dm-logo{width:76px;height:76px;border-radius:16px;object-fit:cover;border:3px solid rgba(255,255,255,.45);flex-shrink:0;}
    .dm-title{font-family:"Playfair Display",serif;font-size:1.55rem;color:#fff;}
    .dm-subtitle{color:rgba(255,255,255,.85);font-size:.8rem;margin-top:2px;}
    .dm-horario{display:inline-block;margin-top:7px;background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:3px 12px;font-size:.76rem;font-weight:600;}

    .cart-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid var(--pink-light);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(244,82,122,.1);}
    .cart-bar-left{font-weight:700;color:var(--pink);font-size:.9rem;}
    .cart-bar-right{font-size:.83rem;color:var(--muted);font-weight:600;}

    .dm-products{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:14px 11px 16px;max-width:500px;margin:0 auto;}
    .dm-card{background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 3px 12px rgba(244,82,122,.1);display:flex;flex-direction:column;transition:transform .15s;}
    .dm-card:active{transform:scale(.97);}
    .dm-card-img{width:100%;height:120px;object-fit:cover;display:block;}
    .dm-card-body{padding:8px 10px 11px;flex:1;display:flex;flex-direction:column;gap:4px;}
    .dm-card-name{font-weight:700;font-size:.83rem;color:var(--text);line-height:1.3;}
    .dm-card-price{font-family:"Playfair Display",serif;font-size:.98rem;color:var(--pink);font-weight:700;}
    .counter{display:flex;align-items:center;gap:7px;margin-top:3px;}
    .counter button{width:26px;height:26px;border-radius:50%;border:2px solid var(--pink);background:#fff;color:var(--pink);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
    .counter button:active{background:var(--pink);color:#fff;}
    .counter span{font-size:.88rem;font-weight:700;min-width:16px;text-align:center;}

    .btn-whatsapp{display:block;width:calc(100% - 22px);max-width:478px;margin:0 auto 18px;background:linear-gradient(135deg,var(--pink),var(--fuchsia));color:#fff;border:none;border-radius:50px;padding:13px 20px;font-family:"Poppins",sans-serif;font-size:.96rem;font-weight:700;cursor:pointer;text-align:center;box-shadow:0 6px 18px rgba(233,30,140,.3);transition:transform .15s;}
    .btn-whatsapp:active{transform:scale(.97);}
    .empty-msg{display:none;text-align:center;color:var(--muted);font-size:.82rem;padding-bottom:8px;}
    footer{text-align:center;padding:16px;color:var(--muted);font-size:.75rem;}
    footer strong{color:var(--green-dark);}
  </style>
</head>
